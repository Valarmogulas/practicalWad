<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-4">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3">
          <div class="list-group">
            <a href="admin.html" class="list-group-item list-group-item-action active">Dashboard</a>
            <a href="students.html" class="list-group-item list-group-item-action">Students</a>
            <a href="#" class="list-group-item list-group-item-action">Exams</a>
            <a href="#" class="list-group-item list-group-item-action">Settings</a>
          </div>
        </div>
        <!-- Main Content -->
        <div class="col-md-9">
          <h1>Exam Statistics</h1>
          <div class="row">
            <div class="col-md-4">
              <div class="card text-white bg-primary mb-3">
                <div class="card-body">
                  <h5 class="card-title">Total Students</h5>
                  <p class="card-text fs-2">500</p>
                </div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card text-white bg-success mb-3">
                <div class="card-body">
                  <h5 class="card-title">Exams Conducted</h5>
                  <p class="card-text fs-2">120</p>
                </div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card text-white bg-warning mb-3">
                <div class="card-body">
                  <h5 class="card-title">Pending Exams</h5>
                  <p class="card-text fs-2">2</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
