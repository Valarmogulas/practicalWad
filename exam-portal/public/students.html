<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-4">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3">
          <div class="list-group">
            <a href="admin.html" class="list-group-item list-group-item-action">Dashboard</a>
            <a href="students.html" class="list-group-item list-group-item-action active">Students</a>
            <a href="#" class="list-group-item list-group-item-action">Exams</a>
            <a href="#" class="list-group-item list-group-item-action">Settings</a>
          </div>
        </div>
        <!-- Main Content -->
        <div class="col-md-9">
          <h1>Student List</h1>
          <table class="table table-striped mt-4">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Name</th>
                <th scope="col">ID</th>
                <th scope="col">Status</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th scope="row">1</th>
                <td>Pranav</td>
                <td>S101</td>
                <td><span class="badge bg-success">Active</span></td>
              </tr>
              <tr>
                <th scope="row">2</th>
                <td>John Doe</td>
                <td>S102</td>
                <td><span class="badge bg-success">Active</span></td>
              </tr>
              <tr>
                <th scope="row">3</th>
                <td>Jane Smith</td>
                <td>S103</td>
                <td><span class="badge bg-warning">Suspended</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
